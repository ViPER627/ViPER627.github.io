<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ViPER 映相所 Studio</title>

  <link href="assets/css/style.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/lightbox2@2/dist/css/lightbox.min.css" rel="stylesheet"/>
</head>

<body>

<header class="site-header">
  <div class="logo-area">
    <img src="assets/images/LOGO_.png" class="logo-img"/>
  </div>

  <nav class="main-nav">
    <ul>
      <li><a href="#about"><img src="assets/images/icon-about.png"/>關於我</a></li>
      <li><a href="#portfolio"><img src="assets/images/icon-portfolio.png"/>作品集</a></li>

      <li style="position: relative;">
        <a href="#" onclick="copyEmail(); return false;">
          <img src="assets/images/icon-contact.png"/>聯絡我
        </a>
        <div id="copy-tooltip" class="tooltip">✔ 已複製信箱
          <div class="tooltip-arrow"></div>
        </div>
      </li>
    </ul>
  </nav>
</header>

<!-- HERO -->
<section class="hero" id="vanta-bg">
  <div class="avatar-wrapper fade-in0">
    <div class="avatar-glow-ring"></div>
    <img src="assets/images/profile.jpg" class="avatar"/>
  </div>

  <div class="intro">
    <h1 class="fade-in">嗨，我是 Vincent，一位專注於視覺與動態設計的創作者。</h1>
    <p class="fade-in">擅長平面與品牌設計、UI、2D動畫、3D建模、AI創作與攝影。</p>
    <a href="#portfolio" class="btn fade-in">瀏覽作品集</a>
  </div>
</section>

<!-- ABOUT -->
<section class="section about" id="about">
  <div class="container fade-in2">
    <h2>∵ 關於我</h2>
    <p>（你的介紹文字保留即可）</p>
  </div>
</section>

<!-- PORTFOLIO -->
<section class="section portfolio" id="portfolio">
  <div class="container">
    <h2>∵ 作品集</h2>

    <div class="portfolio-tabs">
      <button class="tab-button active" data-tab="design">設計 / 接案</button>
      <button class="tab-button" data-tab="3d">3D / 遊戲</button>
      <button class="tab-button" data-tab="ai">AI 創作</button>
      <button class="tab-button" data-tab="photo">攝影作品</button>
    </div>

    <!-- 作品區（你原本內容 그대로保留） -->
    <div class="portfolio-content masonry-grid" id="design">
      <!-- 保持你原本所有圖片 -->
    </div>

    <div class="portfolio-content masonry-grid" id="3d"></div>
    <div class="portfolio-content masonry-grid" id="ai"></div>
    <div class="portfolio-content masonry-grid" id="photo"></div>

  </div>
</section>

<footer>
  <div class="container">
    <p>© 2025 Vincent Xiao | ViPER 映相所</p>
  </div>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/lightbox2@2/dist/js/lightbox-plus-jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.124.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>

<script>
/* 背景動畫 */
VANTA.WAVES({
  el: "#vanta-bg",
  color: "#a4a4a4",
  shininess: 0,
  waveHeight: 10,
  waveSpeed: 1,
  zoom: 1,
  backgroundColor: "#dedede"
});

/* TAB 切換 */
document.addEventListener("DOMContentLoaded", function () {
  const tabs = document.querySelectorAll(".tab-button");
  const contents = document.querySelectorAll(".portfolio-content");

  tabs.forEach(tab => {
    tab.addEventListener("click", function () {
      const target = this.dataset.tab;

      tabs.forEach(t => t.classList.remove("active"));
      this.classList.add("active");

      contents.forEach(c => {
        c.style.display = "none";
      });

      document.getElementById(target).style.display = "block";
    });
  });
});

/* 複製信箱 */
function copyEmail() {
  const email = "viper_72527@yahoo.com.tw";
  navigator.clipboard.writeText(email);

  const tooltip = document.getElementById("copy-tooltip");
  tooltip.style.opacity = "1";

  setTimeout(() => {
    tooltip.style.opacity = "0";
  }, 2000);
}
</script>

</body>
</html>
